<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodygraph - Track With Your Photo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: #1a1a1a; background: #fafafa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hero { text-align: center; padding: 48px 24px; max-width: 480px; }
        .icon { width: 120px; height: 120px; border-radius: 28px; margin-bottom: 24px; box-shadow: 0 8px 24px rgba(77,199,140,0.25); }
        h1 { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
        .tagline { color: #888; font-size: 18px; margin-bottom: 32px; }
        .desc { color: #555; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
        .badge { display: inline-block; }
        .badge img { height: 54px; }
        .links { margin-top: 32px; }
        .links a { color: #4DC78C; text-decoration: none; margin: 0 12px; font-size: 14px; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="hero">
        <img src="/icon.png" alt="Bodygraph" class="icon">
        <h1>Bodygraph</h1>
        <p class="tagline">Track With Your Photo</p>
        <p class="desc">Log your weight, snap progress photos, and slide to compare your transformation. The simplest body tracking app.</p>
        <a href="https://apps.apple.com/app/bodygraph/id6760837006" class="badge">
            <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
        </a>
        <div class="links">
            <a href="/privacy">Privacy Policy</a>
            <a href="/terms">Terms of Use</a>
            <a href="/support">Support</a>
        </div>
    </div>
</body>
</html>
