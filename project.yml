name: BodyLog
options:
  bundleIdPrefix: com.bodylog
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: true
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"

targets:
  BodyLog:
    type: application
    platform: iOS
    sources:
      - path: BodyLog
        excludes:
          - "**/.DS_Store"
    resources:
      - path: BodyLog/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: BodyLog/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bodylog.app
        PRODUCT_NAME: BodyLog
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: BodyLog/Resources/BodyLog.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        SWIFT_EMIT_LOC_STRINGS: true
    dependencies:
      - package: RevenueCat
        product: RevenueCat
